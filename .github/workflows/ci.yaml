name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Lint driver modules
        run: |
          for dir in drivers/oxia drivers/etcd drivers/zookeeper; do
            echo "Linting $dir..."
            cd $dir
            golangci-lint run ./...
            cd $GITHUB_WORKSPACE
          done

      - name: Build
        run: make build
