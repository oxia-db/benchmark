# S4 — Expiry storm: what does mass session death do to cleanup time and to the foreground?
#
# With 100k live sessions (k ephemerals each), 10% / 50% / 100% of the clients are killed abruptly and
# simultaneously. We measure the cleanup completion curve (fraction of ephemerals confirmed deleted vs
# time, sampled at sub-second resolution over a representative key sample) and the foreground
# throughput / p99 over the same timeline. Emits a time series per kill fraction.
#
# NOTE: 100k live sessions is spread across worker instances; scale replicas so per-worker socket and
# thread counts stay within limits. The completion curve is built from a sampled subset of killed keys
# (sampleKeys) polled every sampleIntervalMs — cheap and uniform across systems via the same exists()
# probe.
exitWhenFinish: true
items:
  - name: S4 storm k=1
    description: Expiry storm at 10/50/100% kill, 1 ephemeral/session
    type: S4
    sessionTimeout: 10s
    ephemeralsPerSession: 1
    ephemeralValueSize: 16
    createConcurrency: 512
    warmup: 20s
    sessions: 100000
    killFractionSweep: [0.1, 0.5, 1.0]
    sampleKeys: 2000
    sampleIntervalMs: 200
    settleTimeout: 60s
    foregroundRate: 20000        # ~50% of saturation — tune per system
    foregroundReadRatio: 0.5
    foregroundKeyspaceSize: 1000000
    foregroundKeyDistribution: zipf
    foregroundValueSize: 64
    foregroundParallelism: 8
  - name: S4 storm k=10
    description: Expiry storm at 10/50/100% kill, 10 ephemerals/session
    type: S4
    sessionTimeout: 10s
    ephemeralsPerSession: 10
    ephemeralValueSize: 16
    createConcurrency: 512
    warmup: 20s
    sessions: 100000
    killFractionSweep: [0.1, 0.5, 1.0]
    sampleKeys: 2000
    sampleIntervalMs: 200
    settleTimeout: 60s
    foregroundRate: 20000
    foregroundReadRatio: 0.5
    foregroundKeyspaceSize: 1000000
    foregroundKeyDistribution: zipf
    foregroundValueSize: 64
    foregroundParallelism: 8
