# Failure-recovery experiment — etcd variant. Same shape as workload-failover.yaml, but at
# 5k ops/s aggregate (2 workers x 2.5k): on the 2 vCPU / 4 GiB footprint etcd cannot hold
# the 10k target for more than a couple of minutes — the async pipeline fills to the
# outstanding cap and measured latency becomes queue sojourn time (~2s), which would bury
# the failover signal. The lower, sustainable rate (and a bounded queue) keeps the
# baseline healthy so the kill is measured, not the backlog. Disclosed in the report.
exitWhenFinish: false
metadata:
  serverNum: 1
items:
  - name: insert-only
    description: Insert-only load phase — populates the 1M keyspace
    hidden: true
    readRatio: 0.0
    keyspaceSize: 1000000
    keyDistribution: order
    valueSize: 64
    targetRate: 40000
    duration: 60s
    parallelism: 8
  - name: YCSB A failover
    description: Update heavy — 50% reads, 50% updates, zipfian, fixed 2.5k ops/s per worker
    readRatio: 0.5
    keyspaceSize: 1000000
    keyDistribution: zipf
    valueSize: 64
    targetRate: 2500
    duration: 10m
    warmup: 30s
    parallelism: 4
    maxOutstandingRequests: 1000
