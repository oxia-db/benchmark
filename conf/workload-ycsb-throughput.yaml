# YCSB-style workloads in max-throughput mode: no targetRate, so each phase sends as fast as
# possible bounded by maxOutstandingRequests (the in-flight cap). Latency is irrelevant here —
# the report shows achieved ops/s per backend (no latency chart for targetRate=0 workloads).
# Small keyspace (like workload-comparison.yaml) so the insert phase fully covers it on every
# backend and the update/read phases never touch missing keys.
exitWhenFinish: false
metadata:
  serverNum: 1
items:
  - name: insert-only
    description: 100% writes, sequential keys, max throughput
    readRatio: 0.0
    keyspaceSize: 10000
    keyDistribution: order
    valueSize: 64
    duration: 60s
    warmup: 10s
    parallelism: 8
    maxOutstandingRequests: 10000
  - name: YCSB X
    description: 100% updates, zipf distribution, max throughput
    readRatio: 0.0
    keyspaceSize: 10000
    keyDistribution: zipf
    valueSize: 64
    duration: 60s
    warmup: 10s
    parallelism: 8
    maxOutstandingRequests: 10000
  - name: YCSB A
    description: 50% updates, 50% reads, zipf distribution, max throughput
    readRatio: 0.5
    keyspaceSize: 10000
    keyDistribution: zipf
    valueSize: 64
    duration: 60s
    warmup: 10s
    parallelism: 8
    maxOutstandingRequests: 10000
  - name: YCSB C
    description: 100% reads, zipf distribution, max throughput
    readRatio: 1.0
    keyspaceSize: 10000
    keyDistribution: zipf
    valueSize: 64
    duration: 60s
    warmup: 10s
    parallelism: 8
    maxOutstandingRequests: 10000
