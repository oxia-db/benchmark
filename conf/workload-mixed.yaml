exitWhenFinish: false
metadata:
  serverNum: 1
items:
  - name: insert-only
    description: 100% writes, sequential keys
    readRatio: 0.0
    keyspaceSize: 10000000    # 10M keys
    keyDistribution: order
    valueSize: 64
    targetRate: 40000
    duration: 5m
    parallelism: 1000
  - name: YCSB X
    description: 100% updates, zipf distribution
    readRatio: 0.0
    keyspaceSize: 10000000
    keyDistribution: zipf
    valueSize: 64
    targetRate: 40000
    duration: 5m
    parallelism: 1000
  - name: YCSB A
    description: 50% updates, 50% reads, zipf distribution
    readRatio: 0.5
    keyspaceSize: 10000000
    keyDistribution: zipf
    valueSize: 64
    targetRate: 40000
    duration: 5m
    parallelism: 1000
  - name: YCSB C
    description: 100% reads, zipf distribution
    readRatio: 1
    keyspaceSize: 10000000
    keyDistribution: zipf
    valueSize: 64
    targetRate: 40000
    duration: 5m
    parallelism: 1000