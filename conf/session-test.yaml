# Quick session-suite smoke: one tiny instance of each experiment (S1-S4) for local runs and CI.
# Scales are small and the timeout is short so the whole file finishes in a couple of minutes against
# a single-node cluster. sessionTimeout is 4s = 2*tickTime (the ZooKeeper minimum with the default
# 2s tick); bump tickTime down if you want a shorter timeout.
exitWhenFinish: true
items:
  - name: S1 smoke
    description: Tiny capacity sweep
    type: S1
    sessionTimeout: 4s
    ephemeralsPerSession: 1
    createConcurrency: 64
    warmup: 2s
    holdDuration: 3s
    foregroundRate: 500
    foregroundKeyspaceSize: 10000
    foregroundParallelism: 2
    sessionsSweep: [50, 100]
  - name: S2 smoke
    description: Tiny churn sweep, graceful
    type: S2
    sessionTimeout: 4s
    ephemeralsPerSession: 1
    createConcurrency: 128
    warmup: 1s
    holdDuration: 3s
    departure: graceful
    foregroundRate: 0
    churnRateSweep: [20, 50]
  - name: S3 smoke
    description: Tiny cleanup-visibility, idle only (foregroundRate 0)
    type: S3
    sessionTimeout: 4s
    ephemeralsPerSession: 1
    createConcurrency: 64
    warmup: 1s
    backgroundSessions: 50
    trials: 5
    settleTimeout: 10s
    foregroundRate: 0
  - name: S4 smoke
    description: Tiny expiry storm
    type: S4
    sessionTimeout: 4s
    ephemeralsPerSession: 1
    createConcurrency: 64
    warmup: 2s
    sessions: 200
    killFractionSweep: [0.5, 1.0]
    sampleKeys: 100
    sampleIntervalMs: 200
    settleTimeout: 15s
    foregroundRate: 500
    foregroundKeyspaceSize: 10000
    foregroundParallelism: 2
