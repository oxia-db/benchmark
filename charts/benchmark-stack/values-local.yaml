# Scaled-down values for a local kind/docker-desktop run.
# Sized to fit alongside other workloads on a small (~8 GiB) single node.
# Deploy:  helm install bench charts/benchmark-stack -n bench --create-namespace \
#            -f charts/benchmark-stack/values-local.yaml --set-file workloadsYaml=conf/workload-test.yaml

global:
  security:
    allowInsecureImages: true

# Small Oxia cluster (system under test)
oxia-cluster:
  enabled: true
  replicationFactor: 3
  initialShardCount: 4
  coordinator:
    cpu: "100m"
    memory: 128Mi
  server:
    replicas: 3
    cpu: "500m"
    memory: 512Mi
    storage: 2Gi
  image:
    repository: oxia/oxia
    tag: 0.16.7
    pullPolicy: IfNotPresent
  pprofEnabled: false
  monitoringEnabled: false

zookeeper:
  enabled: false

etcd:
  enabled: false

# The workload is supplied from conf/ at install time, e.g.:
#   --set-file workloadsYaml=conf/workload-test.yaml
# One small worker pod
workers:
  - name: oxia-worker
    parallelism: 1
    cpu: "500m"
    memory: 512Mi
    # Locally-built arm64 image (kind load); Never = use the loaded image, don't pull.
    image: oxia/benchmark:local
    imagePullPolicy: Never
    driverConfig:
      driver: oxia
      config:
        serviceAddress: "bench:6648"
        batchMaxCount: 5000
