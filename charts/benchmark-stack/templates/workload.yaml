apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-workloads-config
data:
  # Workload definitions live only under conf/. Provide the chosen file at install time:
  #   --set-file workloadsYaml=conf/workload-mixed.yaml
  workloads.yaml: |
{{ .Values.workloadsYaml | required "workloadsYaml is required: pass --set-file workloadsYaml=conf/<workload>.yaml" | indent 4 }}
