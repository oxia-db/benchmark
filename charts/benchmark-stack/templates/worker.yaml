{{- range .Values.workers }}
{{- $driver := .driverConfig.driver }}
{{- /* StatefulSet to wait on: explicit waitForStsName wins, else the release name for oxia, else <release>-<driver> */}}
{{- $stsName := printf "%s-%s" $.Release.Name $driver }}
{{- if .waitForStsName }}{{ $stsName = printf "%s-%s" $.Release.Name .waitForStsName }}{{ else if eq $driver "oxia" }}{{ $stsName = $.Release.Name }}{{ end }}
---
# Headless service required by the worker StatefulSet below.
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
spec:
  clusterIP: None
  selector:
    app: {{ $.Release.Name }}-{{ .name }}
---
# StatefulSet (not Deployment) so each worker gets a stable ordinal: WORKER_INDEX/WORKER_COUNT
# let replicated workers partition the "order" keyspace into disjoint slices instead of all
# writing the same keys.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
spec:
  serviceName: {{ $.Release.Name }}-{{ .name }}
  podManagementPolicy: Parallel
  replicas: {{ .parallelism | default 1 }}
  selector:
    matchLabels:
      app: {{ $.Release.Name }}-{{ .name }}
  template:
    metadata:
      labels:
        app: {{ $.Release.Name }}-{{ .name }}
    spec:
      serviceAccountName: {{ $.Release.Name }}-worker-sa
      initContainers:
        - name: wait-{{ .name }}
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              STS_NAME="{{ $stsName }}"
              echo "Waiting for Target Cluster $STS_NAME to be ready..."
              # Generous timeout: on autoscaled clusters the backend can sit Pending for
              # minutes while nodes provision; a short wait makes this init container
              # crash-loop, which the orchestration would misread as unrecoverable.
              kubectl wait sts/$STS_NAME \
                --for=jsonpath='{.status.readyReplicas}'=$(kubectl get sts $STS_NAME -o jsonpath='{.spec.replicas}') \
                --timeout=900s

              echo "Sleeping 20s to let cluster bootstrap..."
              sleep 30
              echo "StatefulSet $STS_NAME is ready!"
      containers:
        - name: {{ $.Release.Name }}-{{ .name }}
          image: "{{ .image | default "oxia/benchmark:main" }}"
          imagePullPolicy: {{ .imagePullPolicy | default "Always" }}
          resources:
            requests:
              cpu: {{ .cpu }}
              memory: {{ .memory }}
            limits:
              cpu: {{ .cpu }}
              memory: {{ .memory }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # StatefulSet ordinal (k8s >= 1.28 stamps this label) — the worker's slot among the
            # replicas, used to slice the "order" keyspace disjointly.
            - name: WORKER_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: WORKER_COUNT
              value: {{ .parallelism | default 1 | quote }}
            # The JVM defaults to 25% of the container limit for its heap, wasting 3/4 of the
            # pod's memory — with deep in-flight pipelines (maxOutstandingRequests 100k) the
            # workers OOM at 1Gi heap inside a 4Gi container. Use most of the container for the
            # heap, and exit on OOM so a starved worker restarts visibly instead of GC-thrashing.
            # ZGC keeps the load generator's pauses sub-ms so measured latency percentiles
            # reflect the server, not worker GC (generational by default on the JRE 25 runtime).
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseZGC -XX:MaxRAMPercentage=70 -XX:+ExitOnOutOfMemoryError{{ with .javaOpts }} {{ . }}{{ end }}"
          args:
            - "--driver-config"
            - "/etc/{{ .name }}-driver/driver-config.yaml"
            {{- /* sessionExperiments: true runs the session/ephemeral suite; the mounted
                   workloadsYaml blob is then a session-experiments file, not a workloads file. */}}
            - "{{ if .sessionExperiments }}--session-experiments{{ else }}--workloads{{ end }}"
            - "/etc/workloads/workloads.yaml"
            - "--results-dir"
            - "/results"
            - "--instance-id"
            - "$(POD_NAME)"
          volumeMounts:
            - name: driver-config
              mountPath: /etc/{{ .name }}-driver
              readOnly: true
            - name: workloads-config
              mountPath: /etc/workloads
              readOnly: true
            - name: results
              mountPath: /results
      volumes:
        - name: driver-config
          configMap:
            name: {{ $.Release.Name }}-{{ .name }}-driver-config
        - name: workloads-config
          configMap:
            name: {{ $.Release.Name }}-workloads-config
        - name: results
          emptyDir: {}
{{- end }}