# Default values shared by every environment. Helm always loads this file first
# and merges any -f values file on top, so common settings — notably the Oxia
# version — live here once instead of being duplicated (and drifting) across the
# per-environment values-*.yaml files. Override any of these in an env file as
# needed; note that list values (e.g. workloads, workers) are replaced wholesale,
# not merged, so those stay in the env files.

global:
  security:
    allowInsecureImages: true

oxia-cluster:
  enabled: false
  image:
    repository: oxia/oxia
    tag: 0.16.7
    pullPolicy: IfNotPresent

# Every optional backend defaults to disabled, so a values file enables only the
# one it wants. Without these defaults the subchart backends (zookeeper, etcd,
# consul) render by default — a missing Chart.yaml condition path is treated as
# enabled — and the raw-template backends (redis, tikv) nil-pointer.
zookeeper:
  enabled: false
etcd:
  enabled: false
consul:
  enabled: false
redis:
  enabled: false
tikv:
  enabled: false
