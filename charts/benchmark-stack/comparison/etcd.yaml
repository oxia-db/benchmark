# etcd (bitnami subchart), single-node, sized for a real cluster (3 CPU / 6Gi). 3 worker pods.
etcd:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    size: 2Gi
  auth:
    rbac:
      create: false
      allowNoneAuthentication: true
    token:
      enabled: false
  image:
    repository: bitnamilegacy/etcd
  resources:
    requests:
      cpu: "3"
      memory: 6Gi
    limits:
      cpu: "3"
      memory: 6Gi
  preUpgradeJob:
    enabled: false

workers:
  - name: etcd-worker
    # 2 workers, not 3: the jetcd/gRPC client's off-heap growth over a 60s run needs ~1.5Gi
    # per worker, and 3 of those don't fit the node alongside the long-lived oxia namespace.
    parallelism: 2
    cpu: "300m"
    memory: 384Mi
    driverConfig:
      driver: etcd
      config:
        endpoints:
          - "bench-etcd:2379"
        dialTimeout: 5s
