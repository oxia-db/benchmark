# Shared workloads for the cross-driver comparison. Helm replaces the workloads list wholesale,
# so applying this overlay after any backend file forces every system to run the identical set.
# Short + small (correctness validation on a laptop kind node, not a perf run). The small keyspace
# is fully covered by the write workload so the read workload hits existing keys on every driver
# (e.g. ZooKeeper getData on a missing node would otherwise error).
workloads:
  exitWhenFinish: false
  metadata:
    serverNum: 1
  items:
    - readRatio: 0.0 # insert / write-only
      keyspaceSize: 10000
      keyDistribution: order
      valueSize: 64
      targetRate: 1000
      duration: 20s
      warmup: 5s
      parallelism: 8
    - readRatio: 1.0 # read-only
      keyspaceSize: 10000
      keyDistribution: uniform
      valueSize: 64
      targetRate: 1000
      duration: 20s
      warmup: 5s
      parallelism: 8
