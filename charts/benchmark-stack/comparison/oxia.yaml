# Oxia, single-node, sized for a real cluster (3 CPU / 4Gi per server node). 3 worker pods (distributed load generator).
oxia-cluster:
  enabled: true
  # The client dials the k8s Service short name; the server's authority validation
  # (new in oxia 0.17) only auto-allows the FQDN form, so allow the short form too.
  allowExtraAuthorities:
    - "bench-oxia:6648"
  replicationFactor: 3
  initialShardCount: 3
  coordinator:
    cpu: "100m"
    memory: 128Mi
  server:
    replicas: 3
    cpu: "3"
    memory: 6Gi
    storage: 2Gi
    # Use the 6Gi allocation: raise the pebble read cache from 512MB to 3GB (see oxia-3.yaml).
    config:
      storage:
        database:
          readCacheSizeMB: 3072
  pprofEnabled: false
  monitoringEnabled: false

workers:
  # Installed with release name "bench-oxia", so the oxia-cluster subchart names its
  # resources bench-oxia-0/1/2 and bench-oxia-coordinator; this worker is bench-oxia-worker.
  - name: worker
    parallelism: 3
    cpu: "300m"
    memory: 384Mi
    driverConfig:
      driver: oxia
      config:
        serviceAddress: "bench-oxia:6648"
        batchMaxCount: 1000
