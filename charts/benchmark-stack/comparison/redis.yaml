# Redis single-node in-memory (speed-ceiling baseline), sized for a real cluster (3 CPU / 4Gi). 3 worker pods.
redis:
  enabled: true
  cpu: "3"
  memory: 4Gi

workers:
  - name: redis-worker
    parallelism: 3
    cpu: "300m"
    memory: 384Mi
    driverConfig:
      driver: redis
      config:
        address: "bench-redis:6379"
