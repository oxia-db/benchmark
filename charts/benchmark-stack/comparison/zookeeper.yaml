# ZooKeeper (bitnami subchart), single-node, sized for a real cluster (3 CPU / 4Gi). 3 worker pods.
zookeeper:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    size: 2Gi
  image:
    repository: bitnamilegacy/zookeeper
  resources:
    requests:
      cpu: "3"
      memory: 4Gi
    limits:
      cpu: "3"
      memory: 4Gi

workers:
  - name: zookeeper-worker
    parallelism: 3
    cpu: "300m"
    memory: 384Mi
    driverConfig:
      driver: zookeeper
      config:
        servers:
          - "bench-zookeeper:2181"
