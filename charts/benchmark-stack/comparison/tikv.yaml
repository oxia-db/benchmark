# TiKV: 1 PD + 1 TiKV store (raw PingCAP images), sized for a real cluster (3 CPU / 4Gi). 3 worker pods.
# Validated end-to-end on kind/arm64 (store serves, worker completes, results gathered).
# Caveat: a single-node store is by far the slowest backend here and saturates well below
# the shared target rate, so its latencies are dominated by queueing; the store also needs
# ~2Gi, so on a node already running other namespaces it may not fit alongside 3 workers.
# The orchestration skips a backend that fails to come up.
tikv:
  enabled: true
  replicas: 1
  image: pingcap/tikv:v8.5.1
  # TiKV is memory-hungry (RocksDB block cache + memtables + raft engine); it OOMKills below ~2Gi.
  # It is also CPU-sensitive: at 1 CPU the store responds too slowly and raw RPCs time out.
  cpu: "3"
  memory: 4Gi
  pdImage: pingcap/pd:v8.5.1
  pd:
    cpu: "1"
    memory: 1Gi

workers:
  - name: tikv-worker
    # 1 load-gen pod, not 3: the single-node store (~2Gi) is the throughput bottleneck and
    # must fit this node alongside the long-lived oxia namespace, which leaves no room for 3.
    parallelism: 1
    cpu: "300m"
    memory: 384Mi
    driverConfig:
      driver: tikv
      config:
        pdAddresses: "bench-pd:2379"
        threads: 32
