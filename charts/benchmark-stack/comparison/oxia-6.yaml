# Oxia, 6-node cluster, 12 shards (2x pods). Results labeled "oxia-6".
oxia-cluster:
  enabled: true
  # The client dials the k8s Service short name; the server's authority validation
  # (new in oxia 0.17) only auto-allows the FQDN form, so allow the short form too.
  allowExtraAuthorities:
    - "bench-oxia:6648"
  replicationFactor: 3
  initialShardCount: 12
  coordinator:
    cpu: "100m"
    memory: 128Mi
  server:
    replicas: 6
    cpu: "3"
    memory: 4Gi
    storage: 2Gi
  pprofEnabled: false
  monitoringEnabled: false

workers:
  - name: worker
    parallelism: 3
    cpu: "300m"
    memory: 384Mi
    driverConfig:
      driver: oxia
      label: oxia-6
      config:
        serviceAddress: "bench-oxia:6648"
        batchMaxCount: 1000
