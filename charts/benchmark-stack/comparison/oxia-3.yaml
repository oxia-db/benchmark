# Oxia, 3-node cluster, 6 shards (2x pods). Results labeled "oxia-3" to compare
# cluster sizes of the same backend side by side.
oxia-cluster:
  enabled: true
  # The client dials the k8s Service short name; the server's authority validation
  # (new in oxia 0.17) only auto-allows the FQDN form, so allow the short form too.
  allowExtraAuthorities:
    - "bench-oxia:6648"
  replicationFactor: 3
  initialShardCount: 6
  coordinator:
    cpu: "100m"
    memory: 128Mi
  server:
    replicas: 3
    cpu: "3"
    memory: 4Gi
    storage: 2Gi
  pprofEnabled: false
  monitoringEnabled: false

workers:
  # Installed with release name "bench-oxia", so the oxia-cluster subchart names its
  # resources bench-oxia-0..N and bench-oxia-coordinator; this worker is bench-oxia-worker.
  - name: worker
    parallelism: 3
    cpu: "300m"
    memory: 384Mi
    driverConfig:
      driver: oxia
      label: oxia-3
      config:
        serviceAddress: "bench-oxia:6648"
        batchLinger: 5ms
        batchMaxCount: 1000
