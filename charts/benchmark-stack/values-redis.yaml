# Deploy + benchmark Redis (single-node, in-memory) as the system under test,
# using the official redis image. Redis is the in-memory speed-ceiling baseline:
# single node, no persistence (AOF/RDB off) — a different durability class than
# the consensus stores, by design.
#
# Install with release name "benchmark" (the worker address below assumes it):
#   helm install benchmark charts/benchmark-stack -f charts/benchmark-stack/values-redis.yaml \
#     --set-file workloadsYaml=conf/workload-mixed.yaml

redis:
  enabled: true
  image: redis:7.2-alpine
  cpu: "2"
  memory: 4Gi

workers:
  - name: redis-worker
    parallelism: 1
    cpu: "2"
    memory: 4Gi
    driverConfig:
      driver: redis
      config:
        address: "benchmark-redis:6379"
