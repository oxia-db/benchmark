# Deploy + benchmark Redis (single-node, in-memory) as the system under test,
# using the official redis image. Redis is the in-memory speed-ceiling baseline:
# single node, no persistence (AOF/RDB off) — a different durability class than
# the consensus stores, by design.
#
# Install with release name "benchmark" (the worker address below assumes it):
#   helm install benchmark charts/benchmark-stack -f charts/benchmark-stack/values-redis.yaml

redis:
  enabled: true
  image: redis:7.2-alpine
  cpu: "2"
  memory: 4Gi

workloads:
  exitWhenFinish: false
  metadata:
    serverNum: 1
  items:
    # insert-only
    - readRatio: 0.0
      keyspaceSize: 1000000
      keyDistribution: order
      valueSize: 64
      targetRate: 50000
      duration: 5m
      parallelism: 100
    # mixed 50/50, zipf
    - readRatio: 0.5
      keyspaceSize: 1000000
      keyDistribution: zipf
      valueSize: 64
      targetRate: 50000
      duration: 5m
      parallelism: 100
    # read-only, zipf
    - readRatio: 1.0
      keyspaceSize: 1000000
      keyDistribution: zipf
      valueSize: 64
      targetRate: 50000
      duration: 5m
      parallelism: 100

workers:
  - name: redis-worker
    parallelism: 1
    cpu: "2"
    memory: 4Gi
    driverConfig:
      driver: redis
      config:
        address: "benchmark-redis:6379"
