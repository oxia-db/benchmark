# Deploy + benchmark HashiCorp Consul (KV) as the system under test, using the
# official HashiCorp chart + image (no Bitnami).
#
# Install with release name "benchmark" (the worker address below assumes it):
#   helm install benchmark charts/benchmark-stack -f charts/benchmark-stack/values-consul.yaml

# Consul: 3-server Raft cluster, KV only (no client agents, mesh, UI, or DNS).
consul:
  enabled: true
  server:
    replicas: 3
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "1"
        memory: 2Gi
  client:
    enabled: false
  connectInject:
    enabled: false
  ui:
    enabled: false
  dns:
    enabled: false

workloads:
  exitWhenFinish: false
  metadata:
    serverNum: 3
  items:
    # insert-only
    - readRatio: 0.0
      keyspaceSize: 1000000
      keyDistribution: order
      valueSize: 64
      targetRate: 10000
      duration: 5m
      parallelism: 100
    # mixed 50/50, zipf
    - readRatio: 0.5
      keyspaceSize: 1000000
      keyDistribution: zipf
      valueSize: 64
      targetRate: 10000
      duration: 5m
      parallelism: 100
    # read-only, zipf
    - readRatio: 1.0
      keyspaceSize: 1000000
      keyDistribution: zipf
      valueSize: 64
      targetRate: 10000
      duration: 5m
      parallelism: 100

workers:
  - name: consul-worker
    parallelism: 1
    cpu: "2"
    memory: 4Gi
    # HashiCorp's chart names the server StatefulSet <release>-consul-server.
    waitForStsName: consul-server
    driverConfig:
      driver: consul
      config:
        address: "benchmark-consul-server:8500"
