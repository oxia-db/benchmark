Configuration:
  status: WARN

  Appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{yyyy/MM/dd HH:mm:ss} %-5level %msg %X%n"

  Loggers:
    Root:
      level: INFO
      AppenderRef:
        - ref: Console
    Logger:
      - name: io.etcd
        level: WARN
      - name: io.grpc
        level: WARN
      - name: io.netty
        level: WARN
      - name: org.apache.zookeeper
        level: WARN
