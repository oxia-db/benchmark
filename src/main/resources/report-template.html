<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oxia Benchmark — Cross-driver Workload Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; line-height: 1.4; }
  h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
  h2 { font-size: 1.05rem; margin: 0 0 .75rem; }
  p.sub { color: #888; margin: 0 0 1.5rem; }
  .card { border: 1px solid #8884; border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem; }
  canvas { max-height: 380px; }
  table { border-collapse: collapse; width: 100%; font-size: .85rem; margin-top: 1rem; }
  th, td { border: 1px solid #8884; padding: 4px 8px; text-align: right; white-space: nowrap; }
  th { background: #8881; }
  td.l, th.l { text-align: left; font-weight: 600; }
  .wrap { overflow-x: auto; }
</style>
</head>
<body>
<h1>Oxia Benchmark — Cross-driver Workload Report</h1>
<p class="sub">One section per workload, comparing every backend. Percentiles are exact (HdrHistogram-merged across all worker pods). Latencies in ms.</p>

<div class="card"><canvas id="throughput-all"></canvas></div>
<div id="workloads"></div>

<script>
const DATA = /*__DATA__*/;
const PALETTE = ['#378ADD','#1D9E75','#D85A30','#7F77DD','#D4537E','#BA7517','#185FA5','#0F6E56'];

Chart.defaults.color = '#888';
Chart.defaults.borderColor = 'rgba(136,136,136,0.2)';

const byWorkload = {};
DATA.forEach(d => { (byWorkload[d.index] = byWorkload[d.index] || []).push(d); });
const indices = Object.keys(byWorkload).map(Number).sort((a, b) => a - b);
const drivers = [...new Set(DATA.map(d => d.driver))].sort();
const color = {}; drivers.forEach((dr, i) => color[dr] = PALETTE[i % PALETTE.length]);

const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const wlabel = (d) => d.name ? `#${d.index} ${d.name}` : `#${d.index} ${d.keyDistribution} r=${d.readRatio}`;

const pctAxis = {
  type: 'logarithmic', min: 1, title: { display: true, text: 'Percentile' },
  ticks: { callback: (v) => {
    const l = Math.log10(v);
    if (Math.abs(l - Math.round(l)) > 1e-6) return '';
    if (v < 1.5) return '0%';
    return parseFloat((100 - 100 / v).toFixed(6)) + '%';
  }}
};

// Top: total throughput per workload, grouped by driver. Only meaningful for workloads in
// throughput mode — at a fixed target rate every bar is just the target, so rate-limited
// workloads are skipped, and the chart is dropped entirely when all of them are.
const tputIndices = indices.filter(i => !(byWorkload[i][0].targetRate > 0));
if (tputIndices.length === 0) {
  document.getElementById('throughput-all').closest('.card').remove();
} else {
  new Chart(document.getElementById('throughput-all'), {
    type: 'bar',
    data: { labels: tputIndices.map(i => wlabel(byWorkload[i][0])), datasets: drivers.map(dr => ({
      label: dr,
      backgroundColor: color[dr],
      data: tputIndices.map(i => {
        const row = byWorkload[i].find(d => d.driver === dr);
        return row ? row.write.opsPerSec + row.read.opsPerSec : 0;
      }),
    }))},
    options: { plugins: { title: { display: true, text: 'Throughput by driver (ops/s)' } },
               responsive: true, scales: { y: { beginAtZero: true } } }
  });
}

// Per-workload comparison sections.
const container = document.getElementById('workloads');
const fmt = (x) => x ? x.toFixed(x < 100 ? 3 : 1) : '0';
indices.forEach(idx => {
  const rows = byWorkload[idx];
  const w = rows[0];
  const throughputMode = !(w.targetRate > 0); // targetRate 0/missing => throughput mode
  const sec = document.createElement('div');
  sec.className = 'card';
  let html = `<h2>Workload #${idx}${w.name ? ' — ' + esc(w.name) : ''}</h2>`;
  if (w.description) html += `<p class="sub" style="margin:.25rem 0 .5rem">${esc(w.description)}</p>`;
  const rate = throughputMode ? 'throughput mode (send as fast as possible)' : `target ${w.targetRate}/s`;
  html += `<p class="sub" style="margin:0 0 .75rem">${w.keyDistribution}, readRatio ${w.readRatio}, ${w.valueSize}B value, ${rate}, parallelism ${w.parallelism}</p>`;

  if (throughputMode) {
    // Throughput test: latency is irrelevant; show achieved ops/s per driver only, no latency chart.
    html += '<div class="wrap"><table>';
    html += '<tr><th class="l">driver</th><th>workers</th><th>write ops/s</th><th>read ops/s</th><th>total ops/s</th><th>failed</th></tr>';
    rows.forEach(r => {
      html += `<tr><td class="l" style="color:${color[r.driver]}">${r.driver}</td><td>${r.workers}</td>`
        + `<td>${fmt(r.write.opsPerSec)}</td><td>${fmt(r.read.opsPerSec)}</td><td>${fmt(r.write.opsPerSec + r.read.opsPerSec)}</td>`
        + `<td>${r.failed}</td></tr>`;
    });
    html += '</table></div>';
    sec.innerHTML = html;
    container.appendChild(sec);
    return;
  }

  const hasWrites = rows.some(r => (r.write.dist || []).length);
  const hasReads = rows.some(r => (r.read.dist || []).length);
  html += `<canvas id="pct-${idx}-total"></canvas>`;
  if (hasWrites) html += `<canvas id="pct-${idx}-write"></canvas>`;
  if (hasReads) html += `<canvas id="pct-${idx}-read"></canvas>`;
  html += `<div class="wrap"><table>`;
  html += '<tr><th class="l">driver</th><th>workers</th><th>w ops/s</th><th>w p50</th><th>w p99</th><th>w p99.9</th><th>w max</th><th>r ops/s</th><th>r p50</th><th>r p99</th><th>r p99.9</th><th>r max</th><th>failed</th></tr>';
  rows.forEach(r => {
    html += `<tr><td class="l" style="color:${color[r.driver]}">${r.driver}</td><td>${r.workers}</td>`
      + `<td>${fmt(r.write.opsPerSec)}</td><td>${fmt(r.write.p50)}</td><td>${fmt(r.write.p99)}</td><td>${fmt(r.write.p999)}</td><td>${fmt(r.write.max)}</td>`
      + `<td>${fmt(r.read.opsPerSec)}</td><td>${fmt(r.read.p50)}</td><td>${fmt(r.read.p99)}</td><td>${fmt(r.read.p999)}</td><td>${fmt(r.read.max)}</td>`
      + `<td>${r.failed}</td></tr>`;
  });
  html += '</table></div>';
  sec.innerHTML = html;
  container.appendChild(sec);

  const pctChart = (canvasId, title, sideOf) => {
    const datasets = [];
    rows.forEach(r => {
      const dist = (sideOf(r) || {}).dist || [];
      if (dist.length) datasets.push({
        label: r.driver,
        data: dist.map(p => ({ x: 1 / (1 - p[0] / 100), y: p[1] })),
        borderColor: color[r.driver], backgroundColor: color[r.driver],
        showLine: true, pointRadius: 0, borderWidth: 2, tension: 0.1,
      });
    });
    new Chart(document.getElementById(canvasId), {
      type: 'scatter', data: { datasets },
      options: {
        responsive: true,
        plugins: { title: { display: true, text: title } },
        scales: { x: pctAxis, y: { beginAtZero: true, title: { display: true, text: 'Latency (ms)' } } }
      }
    });
  };
  pctChart(`pct-${idx}-total`, `Aggregated latency by percentile — workload #${idx}`, r => r.total);
  if (hasWrites) pctChart(`pct-${idx}-write`, `Write latency by percentile — workload #${idx}`, r => r.write);
  if (hasReads) pctChart(`pct-${idx}-read`, `Read latency by percentile — workload #${idx}`, r => r.read);
});
</script>
</body>
</html>
